<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="icon" href="data:," />
    <title>打卡系統</title>
  </head>
  <body>
    <div id="app"></div>
    <script>
      (function() {
        var appVersion = '20260526001215';
        try {
          var url = new URL(window.location.href);
          if (url.searchParams.get('appv') !== appVersion) {
            url.searchParams.set('appv', appVersion);
            window.location.replace(url.toString());
          }
        } catch (e) {}
      })();

      window.onerror = function(msg, src, line, col, err) {
        document.getElementById('app').innerHTML =
          '<div style="min-height:100vh;background:#1e40af;display:flex;align-items:center;justify-content:center;">' +
          '<div style="background:#fff;border-radius:16px;padding:32px;width:280px;word-break:break-all;">' +
          '<div style="font-weight:700;margin-bottom:8px;color:#ef4444;">❌ 發生錯誤</div>' +
          '<div style="font-size:12px;color:#374151;">' + msg + '</div>' +
          '<div style="font-size:11px;color:#9ca3af;margin-top:8px;">' + (src||'') + ':' + line + '</div>' +
          '<button onclick="location.reload()" style="margin-top:16px;width:100%;padding:10px;background:#3b82f6;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;">重新載入</button>' +
          '</div></div>';
      };
      window.onunhandledrejection = function(e) {
        window.onerror(e.reason?.message || String(e.reason), '', 0);
      };
      window.addEventListener('vite:preloadError', function(e) {
        e.preventDefault();
        window.onerror('新版檔案載入失敗，請重新整理', '', 0);
      });
    </script>
    <script type="module" src="/src/main.ts?appv=20260526001215"></script>
  </body>
</html>
